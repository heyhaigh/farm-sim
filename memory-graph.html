<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ry Farms · the town's memory</title>
<style>
  :root { --bg:#0c0d12; --panel:#14161f; --line:#232634; --dim:#7a8090; --creed:#c8a0e0; --belief:#8fc7e8; --gold:#e8c860; --green:#7dd069; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:#e6e8ef; font-family:'JetBrains Mono',ui-monospace,Menlo,monospace; overflow:hidden; }
  #head { position:fixed; top:0; left:0; right:0; padding:14px 18px; z-index:5; pointer-events:none;
    background:linear-gradient(#0c0d12ee,#0c0d1200); }
  #head h1 { margin:0; font-size:15px; letter-spacing:2px; }
  #head h1 b { color:var(--creed); }
  #head .sub { margin-top:3px; font-size:11px; color:var(--dim); }
  #legend { position:fixed; bottom:12px; left:14px; font-size:11px; color:var(--dim); z-index:5; line-height:1.7; }
  #legend .k { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; vertical-align:middle; }
  canvas { display:block; cursor:grab; }
  canvas:active { cursor:grabbing; }
  #panel { position:fixed; top:0; right:0; width:340px; max-width:82vw; height:100%; background:var(--panel);
    border-left:1px solid var(--line); transform:translateX(100%); transition:transform .18s ease; z-index:6;
    padding:20px 18px; overflow-y:auto; }
  #panel.open { transform:translateX(0); }
  #panel h2 { margin:0 0 2px; font-size:17px; color:var(--gold); }
  #panel .arch { font-size:11px; color:var(--dim); margin-bottom:16px; }
  #panel .x { position:absolute; top:14px; right:16px; cursor:pointer; color:var(--dim); font-size:16px; }
  #panel .x:hover { color:#fff; }
  #panel .sect { font-size:10px; letter-spacing:1.5px; color:var(--dim); margin:16px 0 6px; }
  #panel .mem { font-size:12.5px; line-height:1.5; padding:8px 10px; margin-bottom:7px; background:#0e0f16;
    border-left:2px solid var(--creed); border-radius:3px; }
  #empty { position:fixed; inset:0; display:none; align-items:center; justify-content:center; text-align:center;
    color:var(--dim); font-size:13px; z-index:4; padding:24px; line-height:1.7; }
</style>
</head>
<body>
<div id="head">
  <h1>RY FARMS · <b>the town's memory</b></h1>
  <div class="sub" id="sub">reading live from self-hosted SuperMemory…</div>
</div>
<canvas id="c"></canvas>
<div id="legend">
  <span class="k" style="background:var(--creed)"></span>farmer &nbsp;
  <span class="k" style="background:var(--green)"></span>a bond &nbsp;
  <span class="k" style="background:#e05840"></span>a rift &nbsp;· click a farmer to read their memories · drag to move · scroll to zoom
</div>
<div id="empty"></div>
<div id="panel"><span class="x" onclick="closePanel()">✕</span><div id="pbody"></div></div>

<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = Math.min(2, window.devicePixelRatio || 1);
function resize() { W = innerWidth; H = innerHeight; cv.width = W*DPR; cv.height = H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize', resize); resize();

const view = { x: 0, y: 0, z: 1 };            // pan/zoom
let nodes = [], links = [], selected = null, hover = null;

// deterministic colour per farmer name
function nameColor(s){ let h=0; for(const c of s) h=(h*31+c.charCodeAt(0))>>>0; return `hsl(${h%360} 55% 66%)`; }
const RIFT = /chiselled|wronged|fell out|feud/;

async function load() {
  let data;
  try { data = await (await fetch('/api/memory-graph')).json(); }
  catch { data = { farmers: [], links: [], source: 'offline' }; }
  const farmers = data.farmers || [];
  document.getElementById('sub').textContent =
    farmers.length ? `${farmers.length} farmers · ${data.links.length} ties · live from SuperMemory (${data.source})`
                   : '';
  if (!farmers.length) {
    const e = document.getElementById('empty'); e.style.display='flex';
    e.innerHTML = data.source==='offline'
      ? "SuperMemory isn't reachable.<br>start it with <b>./supermemory-start.sh</b>, then reload."
      : "No farmer memories stored yet.<br>open a town, let it run a moment, and they'll persist here.";
    return;
  }
  const cx = W/2, cy = H/2;
  nodes = farmers.map((f,i) => {
    const a = (i/farmers.length)*Math.PI*2;
    return { ...f, first: f.name.split(' ')[0], x: cx+Math.cos(a)*160, y: cy+Math.sin(a)*160, vx:0, vy:0,
             r: 12 + Math.min(14, (f.memories.length||1)*2), col: nameColor(f.name) };
  });
  const byName = new Map(nodes.map(n=>[n.name,n]));
  links = (data.links||[]).map(l => ({ a: byName.get(l.a), b: byName.get(l.b), label: l.label }))
                          .filter(l => l.a && l.b);
  requestAnimationFrame(tick);
}

function tick() {
  // force sim: repulsion + spring on links + gentle gravity to centre
  const cx=W/2, cy=H/2;
  for (const n of nodes) {
    let fx=0, fy=0;
    for (const m of nodes) { if (m===n) continue; let dx=n.x-m.x, dy=n.y-m.y, d2=dx*dx+dy*dy+0.01, d=Math.sqrt(d2);
      const rep = 9000/d2; fx += dx/d*rep; fy += dy/d*rep; }
    fx += (cx-n.x)*0.008; fy += (cy-n.y)*0.008;
    n.vx=(n.vx+fx)*0.86; n.vy=(n.vy+fy)*0.86;
  }
  for (const l of links) { const dx=l.b.x-l.a.x, dy=l.b.y-l.a.y, d=Math.hypot(dx,dy)||1, k=(d-150)*0.02;
    const ux=dx/d, uy=dy/d; if(l.a!==dragNode){l.a.vx+=ux*k;l.a.vy+=uy*k;} if(l.b!==dragNode){l.b.vx-=ux*k;l.b.vy-=uy*k;} }
  for (const n of nodes) { if (n===dragNode) continue; n.x+=n.vx; n.y+=n.vy; }
  draw();
  requestAnimationFrame(tick);
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.save(); ctx.translate(view.x,view.y); ctx.scale(view.z,view.z);
  // edges
  for (const l of links) {
    ctx.strokeStyle = RIFT.test(l.label) ? 'rgba(224,88,64,.5)' : 'rgba(125,208,105,.45)';
    ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(l.a.x,l.a.y); ctx.lineTo(l.b.x,l.b.y); ctx.stroke();
    const mx=(l.a.x+l.b.x)/2, my=(l.a.y+l.b.y)/2;
    ctx.fillStyle='#8a90a0'; ctx.font='10px JetBrains Mono, monospace'; ctx.textAlign='center'; ctx.fillText(l.label, mx, my-4);
  }
  // nodes
  for (const n of nodes) {
    const sel = n===selected, hov = n===hover;
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,7);
    ctx.fillStyle = n.col; ctx.globalAlpha = sel||hov?1:0.9; ctx.fill(); ctx.globalAlpha=1;
    if (sel||hov) { ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); }
    ctx.fillStyle='#0c0d12'; ctx.font='bold 11px JetBrains Mono, monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(n.first.slice(0,4).toUpperCase(), n.x, n.y);
    ctx.fillStyle='#cfd3df'; ctx.font='11px JetBrains Mono, monospace'; ctx.textBaseline='top';
    ctx.fillText(n.first, n.x, n.y+n.r+3);
  }
  ctx.restore();
}

// ---- interaction (pan / zoom / drag node / click) ----
let dragNode=null, panning=null, downAt=null;
function toWorld(e){ return { x:(e.clientX-view.x)/view.z, y:(e.clientY-view.y)/view.z }; }
function hit(e){ const p=toWorld(e); return nodes.find(n=>Math.hypot(n.x-p.x,n.y-p.y)<=n.r+3); }
function far(e){ return downAt && Math.hypot(e.clientX-downAt.x, e.clientY-downAt.y) > 4; } // real drag, not a jittery click
cv.addEventListener('mousedown', e=>{ downAt={x:e.clientX,y:e.clientY}; const n=hit(e); if(n){ dragNode=n; } else panning={x:e.clientX-view.x,y:e.clientY-view.y}; });
cv.addEventListener('mousemove', e=>{ hover=hit(e); cv.style.cursor=hover?'pointer':(panning?'grabbing':'grab');
  if(dragNode && far(e)){ const p=toWorld(e); dragNode.x=p.x; dragNode.y=p.y; dragNode.vx=dragNode.vy=0; }
  else if(panning){ view.x=e.clientX-panning.x; view.y=e.clientY-panning.y; } });
addEventListener('mouseup', e=>{ if(dragNode && !far(e)) selectNode(dragNode); dragNode=null; panning=null; downAt=null; });
cv.addEventListener('wheel', e=>{ e.preventDefault(); const s=Math.exp(-e.deltaY*0.001); const mx=e.clientX,my=e.clientY;
  view.x=mx-(mx-view.x)*s; view.y=my-(my-view.y)*s; view.z*=s; view.z=Math.max(0.4,Math.min(2.4,view.z)); }, {passive:false});

function selectNode(n){ selected=n; const p=document.getElementById('pbody');
  const creeds=n.memories.filter(m=>/creed|lives by|taught them|drilled|raised (them|to)/i.test(m));
  const beliefs=n.memories.filter(m=>/belief|come to believe|earned belief|no longer/i.test(m));
  const rest=n.memories.filter(m=>!creeds.includes(m)&&!beliefs.includes(m));
  const sect=(t,arr,col)=>arr.length?`<div class="sect">${t}</div>`+arr.map(m=>`<div class="mem" style="border-color:${col}">${esc(m)}</div>`).join(''):'';
  p.innerHTML = `<h2>${esc(n.name)}</h2><div class="arch">${n.memories.length} memories held in SuperMemory</div>`
    + sect('CREEDS',creeds,'#c8a0e0') + sect('HARD-WON BELIEFS',beliefs,'#8fc7e8') + sect('WHAT THEY REMEMBER',rest,'#7dd069');
  document.getElementById('panel').classList.add('open');
}
function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function closePanel(){ selected=null; document.getElementById('panel').classList.remove('open'); }
addEventListener('keydown', e=>{ if(e.key==='Escape') closePanel(); });

load();
</script>
</body>
</html>
